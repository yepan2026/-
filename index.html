// 搜索功能
function search() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    
    // 匹配最相关的知识库条目
    let bestMatch = null;
    let bestScore = 0;
    
    knowledgeBase.forEach(item => {
        let score = 0;
        item.keywords.forEach(keyword => {
            if (query.includes(keyword)) score += 2;
        });
        if (item.title.includes(query)) score += 5;
        
        if (score > bestScore) {
            bestScore = score;
            bestMatch = item;
        }
    });
    
    if (bestMatch && bestScore > 0) {
        displayResult(bestMatch);
    } else {
        displayNoResult();
    }
}

// 快速搜索
function quickSearch(question) {
    document.getElementById('searchInput').value = question;
    search();
}

// 显示结果
function displayResult(data) {
    document.getElementById('resultBox').classList.add('active');
    document.getElementById('resultTitle').textContent = data.title;
    document.getElementById('resultDesc').textContent = data.desc;
    document.getElementById('systemPath').textContent = data.path;
    document.getElementById('footerText').textContent = data.reminder;
    
    // 渲染步骤
    const stepsContainer = document.getElementById('stepsContainer');
    stepsContainer.innerHTML = '';
    data.steps.forEach((step, index) => {
        const stepHtml = `
            <div class="step">
                <div class="step-number">${index + 1}</div>
                <div class="step-content">
                    <div class="step-title">${step.title}</div>
                    <div class="step-desc">${step.desc}</div>
                    ${step.image ? `<div class="step-image"><img src="${step.image}" onclick="this.style.maxWidth=this.style.maxWidth==='100%'?'300px':'100%'"/></div>` : ''}
                </div>
            </div>
        `;
        stepsContainer.innerHTML += stepHtml;
    });
    
    // 渲染方案
    const solutionsContainer = document.getElementById('solutionsContainer');
    solutionsContainer.innerHTML = '';
    data.solutions.forEach(sol => {
        const solHtml = `
            <div class="solution-card">
                <div class="solution-name">${sol.name}</div>
                <div class="solution-detail">
                    <div><strong>适用场景：</strong>${sol.scene}</div>
                    <div><strong>配置参数：</strong>${sol.params}</div>
                </div>
            </div>
        `;
        solutionsContainer.innerHTML += solHtml;
    });
    
    // 滚动到结果区
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
}

// 显示无结果
function displayNoResult() {
    document.getElementById('resultBox').classList.add('active');
    document.getElementById('resultBox').innerHTML = `
        <div class="no-result">
            <div class="no-result-icon">😕</div>
            <h3>暂未找到匹配的配置指南</h3>
            <p style="margin-top: 10px;">请尝试其他关键词，如：满单奖励、空单奖励、准时达、连续奖励、站点新增、降低取消率</p>
        </div>
    `;
}
